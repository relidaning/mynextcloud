services:
  nextcloud:
    image: nextcloud@sha256:6e1029b6a988ff0ea45bc573c15889fa339047f72eae8ca4f7135e962b1a7c0b
    ports:
      - 0.0.0.0:8080:80
    restart: unless-stopped
    volumes:
      - /data/nextcloud/data:/var/www/html/data
      - /data/nextcloud/config:/var/www/html/config
      - /data/nextcloud:/var/www/html
    environment:
      - TZ=Asia/Shanghai

  jellyfin:
    image: jellyfin/jellyfin@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
    volumes:
      - /data/jellyfin/config:/config
      - /data/nextcloud/data:/nextcloud
      - /data/rargb:/rargb

  calibre-web:
    image: lscr.io/linuxserver/calibre-web@sha256:561456bd634893293f7038cf24e1297d7fad0c7268682fa36036f400d8ff3760
    environment:
      - TZ=Asia/Shanghai
      - Docker_MODS=linuxserver/mods:universal-calibre
    ports:
      - "8083:8083"
    volumes:
      - /data/calibre/conf:/config
      - /data/nextcloud/data/lidaning/files:/nextcloud
    restart: unless-stopped

